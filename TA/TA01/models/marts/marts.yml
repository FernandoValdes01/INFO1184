version: 2

models:
  - name: mart_kpi_resumen
    description: "Resumen ejecutivo de KPI principales para el dashboard final en Lightdash."
    columns:
      - name: total_ferias
        description: "Cantidad total de ferias registradas."
        config:
          meta:
            metrics:
              kpi_total_ferias:
                label: "KPI total ferias"
                type: sum
                format: "#,##0"
                groups: ["KPI resumen"]
      - name: total_visitantes
        description: "Cantidad total de visitantes registrados."
        config:
          meta:
            metrics:
              kpi_total_visitantes:
                label: "KPI total visitantes"
                type: sum
                format: "#,##0"
                groups: ["KPI resumen"]
      - name: total_ventas
        description: "Cantidad total de ventas."
        config:
          meta:
            metrics:
              kpi_total_ventas:
                label: "KPI total ventas"
                type: sum
                format: "#,##0"
                groups: ["KPI resumen"]
      - name: botellas_vendidas
        description: "Cantidad total de botellas vendidas."
        config:
          meta:
            metrics:
              kpi_botellas_vendidas:
                label: "KPI botellas vendidas"
                type: sum
                format: "#,##0"
                groups: ["KPI resumen"]
      - name: ingresos_totales
        description: "Suma neta de ventas."
        config:
          meta:
            metrics:
              kpi_ingresos_totales:
                label: "KPI ingresos totales"
                type: sum
                format: "$#,##0.00"
                groups: ["KPI resumen"]
      - name: ticket_promedio
        description: "Monto promedio por venta."
        config:
          meta:
            metrics:
              kpi_ticket_promedio:
                label: "KPI ticket promedio"
                type: average
                format: "$#,##0.00"
                groups: ["KPI resumen"]
      - name: tasa_conversion_visitante
        description: "Porcentaje de visitantes con compra vinculada."
        config:
          meta:
            metrics:
              kpi_tasa_conversion_visitante:
                label: "KPI tasa conversion visitante"
                type: average
                format: '#,##0.00"%"'
                groups: ["KPI resumen"]
      - name: tasa_optin_contacto
        description: "Porcentaje de visitantes que aceptaron contacto."
        config:
          meta:
            metrics:
              kpi_tasa_optin_contacto:
                label: "KPI tasa opt-in contacto"
                type: average
                format: '#,##0.00"%"'
                groups: ["KPI resumen"]

  - name: mart_ventas_por_feria
    description: "Agregacion por feria para analisis comercial y visualizacion en Lightdash."
    config:
      meta:
        metrics:
          ticket_promedio_por_feria:
            label: "Ticket promedio por feria"
            type: number
            sql: "${ingresos_totales_por_feria} / NULLIF(${ventas_totales_por_feria}, 0)"
            format: "$#,##0.00"
            groups: ["Ventas por feria"]
    columns:
      - name: feria_id
        description: "Identificador unico de feria."
        tests:
          - not_null
          - unique
        config:
          meta:
            metrics:
              cantidad_ferias:
                label: "Cantidad de ferias"
                type: count_distinct
                groups: ["Ventas por feria"]
      - name: feria
        description: "Nombre de la feria."
      - name: ciudad_id
        description: "Identificador unico de ciudad."
      - name: ingresos
        description: "Ingreso neto agregado por feria."
        config:
          meta:
            metrics:
              ingresos_totales_por_feria:
                label: "Ingresos totales por feria"
                type: sum
                format: "$#,##0.00"
                groups: ["Ventas por feria"]
      - name: botellas_vendidas
        description: "Botellas vendidas por feria."
        config:
          meta:
            metrics:
              botellas_totales_por_feria:
                label: "Botellas vendidas por feria"
                type: sum
                format: "#,##0"
                groups: ["Ventas por feria"]
      - name: visitantes
        description: "Visitantes registrados por feria."
        config:
          meta:
            metrics:
              visitantes_totales_por_feria:
                label: "Visitantes por feria"
                type: sum
                format: "#,##0"
                groups: ["Ventas por feria"]
      - name: ventas
        description: "Ventas registradas por feria."
        config:
          meta:
            metrics:
              ventas_totales_por_feria:
                label: "Ventas por feria"
                type: sum
                format: "#,##0"
                groups: ["Ventas por feria"]

  - name: mart_ingresos_por_segmento
    description: "Resumen de visitantes, ventas e ingresos por segmento de publico."
    config:
      meta:
        metrics:
          ticket_promedio_por_segmento:
            label: "Ticket promedio por segmento"
            type: number
            sql: "${ingresos_totales_por_segmento} / NULLIF(${ventas_totales_por_segmento}, 0)"
            format: "$#,##0.00"
            groups: ["Ingresos por segmento"]
    columns:
      - name: segmento_id
        description: "Identificador unico del segmento."
        tests:
          - not_null
          - unique
        config:
          meta:
            metrics:
              cantidad_segmentos:
                label: "Cantidad de segmentos"
                type: count_distinct
                groups: ["Ingresos por segmento"]
      - name: segmento
        description: "Nombre del segmento."
      - name: visitantes
        description: "Visitantes asociados al segmento."
        config:
          meta:
            metrics:
              visitantes_totales_por_segmento:
                label: "Visitantes por segmento"
                type: sum
                format: "#,##0"
                groups: ["Ingresos por segmento"]
      - name: ventas
        description: "Ventas asociadas al segmento."
        config:
          meta:
            metrics:
              ventas_totales_por_segmento:
                label: "Ventas por segmento"
                type: sum
                format: "#,##0"
                groups: ["Ingresos por segmento"]
      - name: ingresos
        description: "Ingreso neto asociado al segmento."
        config:
          meta:
            metrics:
              ingresos_totales_por_segmento:
                label: "Ingresos por segmento"
                type: sum
                format: "$#,##0.00"
                groups: ["Ingresos por segmento"]

  - name: mart_mix_vinos
    description: "Desempeno comercial de cada vino segun detalle de venta."
    config:
      meta:
        metrics:
          ingreso_promedio_por_botella:
            label: "Ingreso promedio por botella"
            type: number
            sql: "${ingresos_brutos_totales} / NULLIF(${botellas_totales_vendidas}, 0)"
            format: "$#,##0.00"
            groups: ["Mix de vinos"]
    columns:
      - name: vino_id
        description: "Identificador unico del vino."
        tests:
          - not_null
          - unique
        config:
          meta:
            metrics:
              cantidad_vinos:
                label: "Cantidad de vinos"
                type: count_distinct
                groups: ["Mix de vinos"]
      - name: vino
        description: "Nombre del vino."
      - name: botellas_vendidas
        description: "Cantidad total de botellas vendidas."
        config:
          meta:
            metrics:
              botellas_totales_vendidas:
                label: "Botellas vendidas"
                type: sum
                format: "#,##0"
                groups: ["Mix de vinos"]
      - name: ingresos_brutos
        description: "Ingreso bruto acumulado por vino."
        config:
          meta:
            metrics:
              ingresos_brutos_totales:
                label: "Ingresos brutos"
                type: sum
                format: "$#,##0.00"
                groups: ["Mix de vinos"]

  - name: mart_estado_inventario
    description: "Inventario planificado y ejecutado por feria y producto."
    config:
      meta:
        metrics:
          porcentaje_venta_sobre_plan:
            label: "Porcentaje venta sobre plan"
            type: number
            sql: "100.0 * ${botellas_vendidas_totales} / NULLIF(${botellas_planificadas_totales}, 0)"
            format: '#,##0.00"%"'
            groups: ["Estado inventario"]
          porcentaje_stock_final_sobre_recibido:
            label: "Porcentaje stock final sobre recibido"
            type: number
            sql: "100.0 * ${stock_cierre_total} / NULLIF(${botellas_recibidas_totales}, 0)"
            format: '#,##0.00"%"'
            groups: ["Estado inventario"]
    columns:
      - name: inventario_id
        description: "Identificador unico de inventario."
        tests:
          - not_null
          - unique
        config:
          meta:
            metrics:
              cantidad_registros_inventario:
                label: "Cantidad registros inventario"
                type: count_distinct
                groups: ["Estado inventario"]
      - name: feria_id
        description: "Identificador de la feria."
      - name: vino_id
        description: "Identificador del vino."
      - name: botellas_planificadas
        description: "Cantidad de botellas planificadas."
        config:
          meta:
            metrics:
              botellas_planificadas_totales:
                label: "Botellas planificadas"
                type: sum
                format: "#,##0"
                groups: ["Estado inventario"]
      - name: botellas_recibidas
        description: "Cantidad de botellas recibidas."
        config:
          meta:
            metrics:
              botellas_recibidas_totales:
                label: "Botellas recibidas"
                type: sum
                format: "#,##0"
                groups: ["Estado inventario"]
      - name: botellas_vendidas
        description: "Cantidad de botellas vendidas."
        config:
          meta:
            metrics:
              botellas_vendidas_totales:
                label: "Botellas vendidas"
                type: sum
                format: "#,##0"
                groups: ["Estado inventario"]
      - name: stock_cierre
        description: "Stock disponible al cierre de la feria."
        config:
          meta:
            metrics:
              stock_cierre_total:
                label: "Stock cierre"
                type: sum
                format: "#,##0"
                groups: ["Estado inventario"]
